# ==========================================
# SERVER & APPLICATION
# ==========================================
server.port=8083
spring.application.name=conversion-service

# ==========================================
# DATABASE (H2 In-Memory)
# ==========================================
spring.datasource.url=jdbc:h2:mem:conversion_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==========================================
# H2 CONSOLE
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================================
# MICROSERVICE URLs (Inter-Service Communication)
# ==========================================
service.affiliate-service.url=http://localhost:8081
service.campaign-service.url=http://localhost:8082

# ==========================================
# OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.sys.conversionservice=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE