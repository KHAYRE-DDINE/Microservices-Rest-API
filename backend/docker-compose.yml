version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: affiliate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: affiliate_db  # Optional: creates DB on startup
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - affiliate-net

  affiliate-service:
    build: ./affiliate-service
    container_name: affiliate-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/affiliate_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=30000
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVICE_CAMPAIGN_SERVICE_URL=http://campaign-service:8082
      - SERVICE_CONVERSION_SERVICE_URL=http://conversion-service:8083
      - SERVICE_PRODUCT_SERVICE_URL=http://product-service:8085
    networks:
      - affiliate-net

  campaign-service:
    build: ./campaign-service
    container_name: campaign-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      affiliate-service:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/campaign_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=30000
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVICE_AFFILIATE_SERVICE_URL=http://affiliate-service:8081
    networks:
      - affiliate-net

  conversion-service:
    build: ./conversion-service
    container_name: conversion-service
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      affiliate-service:
        condition: service_started
      campaign-service:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/conversion_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=30000
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVICE_AFFILIATE_SERVICE_URL=http://affiliate-service:8081
      - SERVICE_CAMPAIGN_SERVICE_URL=http://campaign-service:8082
      - SERVICE_PRODUCT_SERVICE_URL=http://product-service:8085
    networks:
      - affiliate-net

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      affiliate-service:
        condition: service_started
      campaign-service:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=30000
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVICE_AFFILIATE_SERVICE_URL=http://affiliate-service:8081
      - SERVICE_CAMPAIGN_SERVICE_URL=http://campaign-service:8082
    networks:
      - affiliate-net

  payment-gateway-service:
    build: ./payment-gateway-service
    container_name: payment-gateway-service
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      affiliate-service:
        condition: service_started
      campaign-service:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/payment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=30000
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVICE_AFFILIATE_SERVICE_URL=http://affiliate-service:8081
      - SERVICE_CAMPAIGN_SERVICE_URL=http://campaign-service:8082
      - SERVICE_CONVERSION_SERVICE_URL=http://conversion-service:8083
    networks:
      - affiliate-net

  frontend:
    build: ../frontend
    container_name: affiliate-frontend
    ports:
      - "3000:3000"
    networks:
      - affiliate-net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: "http payment-gateway-service:8084"
    networks:
      - affiliate-net

volumes:
  mysql_data:

networks:
  affiliate-net:
    driver: bridge