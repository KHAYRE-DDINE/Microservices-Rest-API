server.port=8085
spring.application.name=product-service

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

service.affiliate-service.url=${SERVICE_AFFILIATE_SERVICE_URL:http://localhost:8081}
service.campaign-service.url=${SERVICE_CAMPAIGN_SERVICE_URL:http://localhost:8082}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html