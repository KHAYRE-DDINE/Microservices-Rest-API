server.port=8082
spring.application.name=campaign-service

# MySQL Database
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/campaign_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Service URLs
service.affiliate-service.url=http://affiliate-service:8081